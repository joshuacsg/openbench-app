name: OpenBench
options:
  bundleIdPrefix: com.openbench
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

targets:
  OpenBench:
    type: application
    platform: iOS
    sources:
      - Shared
      - iOS
    info:
      path: iOS/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: OpenBench
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.openbench.viewer
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      CODE_SIGN_STYLE: Automatic

  OpenBench Viewer:
    type: application
    platform: macOS
    sources:
      - Shared
      - macOS
    info:
      path: macOS/Info.plist
      properties:
        CFBundleDisplayName: "OpenBench Viewer"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.openbench.viewer.mac
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      CODE_SIGN_STYLE: Automatic

  OpenBench Host:
    type: application
    platform: macOS
    sources:
      - Host
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.openbench.host
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      INFOPLIST_KEY_CFBundleDisplayName: "OpenBench Host"
      INFOPLIST_KEY_LSUIElement: true
      INFOPLIST_KEY_NSLocalNetworkUsageDescription: "OpenBench Host needs local network access to advertise and serve connections."
      CODE_SIGN_STYLE: Automatic
